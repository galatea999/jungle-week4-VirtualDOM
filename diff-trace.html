<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>diff() 실행 과정 시각화</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Courier New', monospace;
      background: #1e1e2e;
      color: #cdd6f4;
      padding: 24px;
    }

    h1 {
      font-size: 1.2rem;
      color: #89b4fa;
      margin-bottom: 20px;
      font-family: 'Segoe UI', sans-serif;
    }

    /* 상단: 비교 대상 VNode */
    .vnode-panel {
      display: flex;
      gap: 16px;
      margin-bottom: 24px;
    }

    .vnode-box {
      flex: 1;
      background: #313244;
      border-radius: 8px;
      padding: 16px;
    }

    .vnode-box h2 {
      font-size: 0.8rem;
      color: #a6adc8;
      margin-bottom: 10px;
      font-family: 'Segoe UI', sans-serif;
    }

    .vnode-box pre {
      font-size: 0.78rem;
      line-height: 1.6;
      color: #cdd6f4;
    }

    /* 컨트롤 버튼 */
    .controls {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
      align-items: center;
    }

    button {
      padding: 8px 18px;
      border: none;
      border-radius: 6px;
      background: #89b4fa;
      color: #1e1e2e;
      font-weight: bold;
      cursor: pointer;
      font-size: 0.85rem;
    }

    button:hover { background: #b4befe; }
    button:disabled { background: #45475a; color: #6c7086; cursor: not-allowed; }

    .step-info {
      font-size: 0.8rem;
      color: #a6adc8;
    }

    /* 메인: 재귀 트리 + 패치 */
    .main-panel {
      display: flex;
      gap: 16px;
    }

    /* 재귀 호출 트리 */
    .call-stack {
      flex: 1.4;
      background: #313244;
      border-radius: 8px;
      padding: 16px;
      min-height: 400px;
    }

    .call-stack h2 {
      font-size: 0.8rem;
      color: #a6adc8;
      margin-bottom: 12px;
      font-family: 'Segoe UI', sans-serif;
    }

    .call-item {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      padding: 8px 10px;
      border-radius: 6px;
      margin-bottom: 4px;
      font-size: 0.75rem;
      line-height: 1.5;
      opacity: 0.35;
      transition: opacity 0.3s, background 0.3s;
    }

    .call-item.active {
      opacity: 1;
      background: #45475a;
    }

    .call-item.done {
      opacity: 0.65;
    }

    .call-item .indent {
      color: #6c7086;
      white-space: pre;
      flex-shrink: 0;
    }

    .call-item .label {
      color: #89dceb;
      flex-shrink: 0;
    }

    .call-item .detail {
      color: #cdd6f4;
    }

    .call-item .result {
      margin-left: auto;
      flex-shrink: 0;
    }

    /* 패치 결과 */
    .patch-panel {
      flex: 1;
      background: #313244;
      border-radius: 8px;
      padding: 16px;
    }

    .patch-panel h2 {
      font-size: 0.8rem;
      color: #a6adc8;
      margin-bottom: 12px;
      font-family: 'Segoe UI', sans-serif;
    }

    .patch-item {
      padding: 8px 10px;
      border-radius: 6px;
      margin-bottom: 6px;
      font-size: 0.75rem;
      line-height: 1.5;
      opacity: 0;
      transition: opacity 0.4s;
    }

    .patch-item.visible { opacity: 1; }

    .patch-create  { background: #1e3a2f; border-left: 3px solid #a6e3a1; }
    .patch-remove  { background: #3a1e1e; border-left: 3px solid #f38ba8; }
    .patch-replace { background: #3a2e1e; border-left: 3px solid #fab387; }
    .patch-text    { background: #1e2e3a; border-left: 3px solid #89b4fa; }
    .patch-props   { background: #2e1e3a; border-left: 3px solid #cba6f7; }

    .patch-type {
      font-weight: bold;
      text-transform: uppercase;
      font-size: 0.7rem;
      letter-spacing: 0.05em;
    }

    .patch-create  .patch-type { color: #a6e3a1; }
    .patch-remove  .patch-type { color: #f38ba8; }
    .patch-replace .patch-type { color: #fab387; }
    .patch-text    .patch-type { color: #89b4fa; }
    .patch-props   .patch-type { color: #cba6f7; }

    .patch-desc { color: #cdd6f4; margin-top: 2px; }

    /* 설명 박스 */
    .explanation {
      margin-top: 16px;
      background: #313244;
      border-radius: 8px;
      padding: 14px 16px;
      font-size: 0.8rem;
      line-height: 1.7;
      color: #cdd6f4;
      min-height: 56px;
      font-family: 'Segoe UI', sans-serif;
    }

    .explanation .highlight { color: #f9e2af; font-weight: bold; }
    .explanation .code { color: #89dceb; font-family: 'Courier New', monospace; }
  </style>
</head>
<body>

<h1>diff() 실행 과정 시각화</h1>

<!-- 비교 대상 VNode -->
<div class="vnode-panel">
  <div class="vnode-box">
    <h2>OLD VNode (이전 상태)</h2>
    <pre id="old-vnode"></pre>
  </div>
  <div class="vnode-box">
    <h2>NEW VNode (새로운 상태)</h2>
    <pre id="new-vnode"></pre>
  </div>
</div>

<!-- 컨트롤 -->
<div class="controls">
  <button id="btn-prev" disabled>◀ 이전</button>
  <button id="btn-next">다음 ▶</button>
  <span class="step-info" id="step-info">0 / 0 단계</span>
</div>

<!-- 메인 패널 -->
<div class="main-panel">
  <div class="call-stack">
    <h2>재귀 호출 과정</h2>
    <div id="call-list"></div>
  </div>
  <div class="patch-panel">
    <h2>생성된 patches</h2>
    <div id="patch-list"></div>
  </div>
</div>

<!-- 설명 -->
<div class="explanation" id="explanation">
  ▶ <span class="highlight">다음</span> 버튼을 눌러 diff() 실행 과정을 단계별로 확인하세요.
</div>

<script>
  // ─────────────────────────────────────────────
  // 예시 VNode
  // ─────────────────────────────────────────────

  // OLD: <div class="card"> <h2>제목</h2> <p>내용</p> </div>
  const oldVNode = {
    type: 'div',
    props: { class: 'card' },
    children: [
      { type: 'h2', props: {}, children: ['제목'] },
      { type: 'p',  props: {}, children: ['내용'] },
    ],
  };

  // NEW: <div class="card box"> <h2>새 제목</h2> <span>추가됨</span> </div>
  // 변경 사항:
  //   1. div props 변경: class="card" → class="card box"
  //   2. h2 자식 텍스트 변경: '제목' → '새 제목'
  //   3. p → span 으로 타입 변경
  const newVNode = {
    type: 'div',
    props: { class: 'card box' },
    children: [
      { type: 'h2',   props: {}, children: ['새 제목'] },
      { type: 'span', props: {}, children: ['추가됨'] },
    ],
  };

  // VNode를 보기 좋은 문자열로 변환
  function formatVNode(vNode, indent) {
    if (typeof vNode === 'string') return indent + '"' + vNode + '"';
    const propsStr = Object.entries(vNode.props)
      .map(([k, v]) => k + '="' + v + '"')
      .join(' ');
    const tag = propsStr ? vNode.type + ' ' + propsStr : vNode.type;
    if (vNode.children.length === 0) return indent + '<' + tag + ' />';
    const children = vNode.children
      .map((c) => formatVNode(c, indent + '  '))
      .join('\n');
    return indent + '<' + tag + '>\n' + children + '\n' + indent + '</' + vNode.type + '>';
  }

  document.getElementById('old-vnode').textContent = formatVNode(oldVNode, '');
  document.getElementById('new-vnode').textContent = formatVNode(newVNode, '');

  // ─────────────────────────────────────────────
  // 단계별 시나리오 정의
  // ─────────────────────────────────────────────

  const steps = [
    {
      activeCall: 0,
      doneUntil: -1,
      patches: [],
      explanation: '첫 번째 호출: <span class="code">diff(div.card, div.card·box, realArea)</span><br>두 노드 모두 존재하고, 같은 태그 <span class="highlight">div</span> → 자식 비교로 진행합니다.',
    },
    {
      activeCall: 0,
      doneUntil: -1,
      patches: [0],
      explanation: '<span class="highlight">props 비교:</span> <span class="code">class="card"</span> → <span class="code">class="card box"</span> 로 바뀌었으니 <span class="highlight">props 패치</span> 생성!',
    },
    {
      activeCall: 1,
      doneUntil: 0,
      patches: [0],
      explanation: '자식 i=0 비교: <span class="code">diff(h2, h2, div)</span><br>같은 태그 <span class="highlight">h2</span> → props는 같으니 그 안의 자식(텍스트)을 비교하러 들어갑니다.',
    },
    {
      activeCall: 2,
      doneUntil: 1,
      patches: [0, 1],
      explanation: '자식 i=0의 텍스트 비교: <span class="code">diff("제목", "새 제목", h2)</span><br>둘 다 문자열, 내용이 다름 → <span class="highlight">text 패치</span> 생성!',
    },
    {
      activeCall: 3,
      doneUntil: 2,
      patches: [0, 1],
      explanation: '자식 i=1 비교: <span class="code">diff(p, span, div)</span><br>태그가 다름! <span class="highlight">p ≠ span</span> → <span class="highlight">replace 패치</span> 생성!',
    },
    {
      activeCall: 3,
      doneUntil: 2,
      patches: [0, 1, 2],
      explanation: '<span class="highlight">replace 패치</span> 생성 완료. p 전체를 span으로 통째로 교체합니다.<br>타입이 다르면 자식은 보지 않고 바로 return 합니다.',
    },
    {
      activeCall: -1,
      doneUntil: 3,
      patches: [0, 1, 2],
      explanation: '✅ <span class="highlight">diff() 완료!</span> 총 3개의 패치가 만들어졌습니다.<br>이제 <span class="code">patch(patches)</span>가 이 목록을 보고 실제 DOM을 바꿔줍니다.',
    },
  ];

  const calls = [
    { indent: '',       label: 'diff()',  detail: 'div.card  vs  div.card·box' },
    { indent: '  ',     label: 'diff()',  detail: 'h2  vs  h2  (자식 i=0)' },
    { indent: '    ',   label: 'diff()',  detail: '"제목"  vs  "새 제목"  (텍스트)' },
    { indent: '  ',     label: 'diff()',  detail: 'p  vs  span  (자식 i=1)' },
  ];

  const patchDefs = [
    { type: 'props',   desc: 'div.class: "card" → "card box"' },
    { type: 'text',    desc: 'h2 텍스트: "제목" → "새 제목"' },
    { type: 'replace', desc: 'p 전체를 span으로 교체' },
  ];

  // ─────────────────────────────────────────────
  // 렌더링
  // ─────────────────────────────────────────────

  const callList    = document.getElementById('call-list');
  const patchList   = document.getElementById('patch-list');
  const explanation = document.getElementById('explanation');
  const btnPrev     = document.getElementById('btn-prev');
  const btnNext     = document.getElementById('btn-next');
  const stepInfo    = document.getElementById('step-info');

  // 호출 목록 초기 렌더
  calls.forEach(function (call, i) {
    const el = document.createElement('div');
    el.className = 'call-item';
    el.id = 'call-' + i;
    el.innerHTML =
      '<span class="indent">' + call.indent + '</span>' +
      '<span class="label">' + call.label + '</span>' +
      '&nbsp;<span class="detail">' + call.detail + '</span>';
    callList.appendChild(el);
  });

  // 패치 목록 초기 렌더
  patchDefs.forEach(function (p, i) {
    const el = document.createElement('div');
    el.className = 'patch-item patch-' + p.type;
    el.id = 'patch-' + i;
    el.innerHTML =
      '<div class="patch-type">' + p.type + '</div>' +
      '<div class="patch-desc">' + p.desc + '</div>';
    patchList.appendChild(el);
  });

  let currentStep = 0;

  function render(stepIdx) {
    const step = steps[stepIdx];

    // 호출 항목 상태 업데이트
    calls.forEach(function (_, i) {
      const el = document.getElementById('call-' + i);
      el.classList.remove('active', 'done');
      if (i === step.activeCall) {
        el.classList.add('active');
      } else if (i <= step.doneUntil) {
        el.classList.add('done');
      }
    });

    // 패치 표시
    patchDefs.forEach(function (_, i) {
      const el = document.getElementById('patch-' + i);
      if (step.patches.includes(i)) {
        el.classList.add('visible');
      } else {
        el.classList.remove('visible');
      }
    });

    // 설명
    explanation.innerHTML = step.explanation;

    // 버튼
    btnPrev.disabled = stepIdx === 0;
    btnNext.disabled = stepIdx === steps.length - 1;

    // 단계 표시
    stepInfo.textContent = (stepIdx + 1) + ' / ' + steps.length + ' 단계';
  }

  btnNext.addEventListener('click', function () {
    if (currentStep < steps.length - 1) {
      currentStep++;
      render(currentStep);
    }
  });

  btnPrev.addEventListener('click', function () {
    if (currentStep > 0) {
      currentStep--;
      render(currentStep);
    }
  });

  render(0);
</script>
</body>
</html>
